<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <!DOCTYPE html>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/poll-form.css">
</head>

<body>
    <header>
        <h1>WDD Poll Form Exercise</h1>
    </header>

    <main>
        <form>
            <label for="fullname">Fullname:</label>
            <input type="text" name="fullname" id="fullname" required>
            <label for="useremail">Email:</label>
            <input type="email" name="useremail" id="useremail" required>
            <label for="browser">Favorite Browser:</label>
            <select name="browser" id="browser">
                <option value="edge">Microsoft Edge</option>
                <option value="chrome">Google Chrome</option>
                <option value="safari">Safari</option>
                <option value="other">Other</option>
            </select>
            <label for="pet">Do you have a household pet?</label>
            <input type="checkbox" name="pet" id="pet">
            <label for="feedback">List the places you have lived:</label>
            <textarea name="feedback" id="feedback" rows="4"
              placeholder="Provo Utah, Anchorage Alaska, Gothenburg Sweden, London England"></textarea>
            <button type="submit">Submit Poll</button>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 | Aaron Dalton | WDD Poll Form Exercise</p>
    </footer>

</body>

</html>

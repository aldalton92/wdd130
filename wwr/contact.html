<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact Us</title>
    <meta name="description"
      content="Ride the rapids and explore breathtaking rivers with expert guides. Safe, thrilling white water rafting trips for beginners to pros.">
    <meta name="author" content="Aaron Dalton">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/rwrlogo.webp" alt="White Water Rafting Logo">
        <nav class="navigation">
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>
    <main>
        <div class="contact">
            <img src="images/rapids.jpg" alt="River Rapids">
            <h1>Raven Whiteriver Rafting</h1>
            <article>
                <p>85 River Road</p>
                <p>Ruby Alaska</p>
                <p>+1 944 897 4837</p>
                <p>info@whiteriver.com</p>
            </article>
        </div>

        <section class="form">
            <iframe
              src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d10980.404472781544!2d-155.48259177110745!3d64.7398309292356!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sus!4v1775334764578!5m2!1sen!2sus"
              width="300" height="400" style="border:0;" allowfullscreen="" loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"></iframe>

            <form>
                <div class="formgroup">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name">
                    <label for="email">Email</label>
                    <input type="email" name="email" id="email">
                </div>

                <p>Message Purpose</p>

                <div class="radiogroup">
                    <input type="radio" id="inquiry" name="purpose">
                    <label for="inquiry">General Inquiry</label>
                    <input type="radio" name="purpose" id="reservation">
                    <label for="reservation">Reservation Question</label>
                    <input type="radio" name="purpose" id="suggestion">
                    <label for="suggestion">Website Suggestion</label>
                </div>

                <div class="formgroup">
                    <label for="message">Message</label>
                    <textarea name="message" id="message" rows="4"></textarea>
                </div>

                <div class="checkbox">
                    <input type="checkbox" id="subscribe" name="subscribe">
                    <label for="subscribe">Subscribe To Newsletter</label>
                </div>

                <button type="submit">Get in Touch!</button>
            </form>
        </section>

        <section class="employees">
            <h2>We Are Here to Serve You</h2>
            <div class="impimg">
                <img src="images/employee1.jpg" alt="Happy Man 1">
                <img src="images/employee2.jpg" alt="Happy Woman">
                <img src="images/employee3.jpg" alt="Happy Man 2">
            </div>
        </section>

    </main>

    <footer>
        <p>&copy;2026, Raven Whiteriver Rafting, Aaron Dalton</p>
        <nav class="socialmedia">
            <a href="https://www.facebook.com/" target="_blank" rel="noopener noreferrer">
                <img src="images/facebook.png" alt="facebook logo">
            </a>
            <a href="https://www.instagram.com/" target="_blank" rel="noopener noreferrer">
                <img src="images/instagram.png" alt="instagram logo">
            </a>
            <a href="https://www.youtube.com/" target="_blank" rel="noopener noreferrer">
                <img src="images/youtube.png" alt="youtube logo">
            </a>
        </nav>
    </footer>
</body>

</html>
